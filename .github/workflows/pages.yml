name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Prepare deploy directory
        run: |
          mkdir _site
          cp -r 09_interactive_app _site/09_interactive_app
          cp -r 10_safety_education _site/10_safety_education
          cp -r 11_references _site/11_references
          cat > _site/index.html << 'LANDING'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Nuclear Energy in Singapore</title>
            <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
              .container { text-align: center; padding: 2rem; max-width: 600px; }
              h1 { font-size: 2rem; margin-bottom: 0.5rem; }
              p { color: #94a3b8; margin-bottom: 2rem; }
              .links { display: flex; flex-direction: column; gap: 1rem; }
              a { display: block; padding: 1.25rem; background: #1e293b; border-radius: 12px; color: #f8fafc; text-decoration: none; font-weight: 600; font-size: 1.1rem; transition: background 0.2s; }
              a:hover { background: #2563eb; }
              .subtitle { font-size: 0.9rem; font-weight: 400; color: #94a3b8; margin-top: 0.25rem; }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>Nuclear Energy in Singapore</h1>
              <p>Interactive educational tools on nuclear energy</p>
              <div class="links">
                <a href="09_interactive_app/">Energy Scenario Explorer<div class="subtitle">Model nuclear energy scenarios for Singapore</div></a>
                <a href="10_safety_education/">Nuclear Safety Explorer<div class="subtitle">Learn about nuclear safety, radiation &amp; historical accidents</div></a>
                <a href="11_references/">References &amp; Sources<div class="subtitle">Full source documentation for every fact and indicator</div></a>
              </div>
            </div>
          </body>
          </html>
          LANDING
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
